services:
  - type: web
    name: ai-web-tester-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install --with-deps chromium
    startCommand: playwright install --with-deps chromium && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/browsers
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /health
